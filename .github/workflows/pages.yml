# Deploys the site to GitHub Pages.
#
# This covers the case where Settings -> Pages -> Source is set to
# "GitHub Actions" (the default on many accounts), which publishes
# nothing unless a workflow like this one exists.
#
# `enablement: true` asks GitHub to switch Pages on automatically if it
# is not already, so the site can go live without changing the setting
# by hand.
#
# If Source is instead "Deploy from a branch", that path publishes the
# repo directly and this workflow is simply redundant.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deployment finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # The whole repo root is the site — index.html sits at the top level.
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
